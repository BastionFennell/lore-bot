- id: iron-vow
  term: Iron Vow
  definition: A sworn oath bound on iron that ties a character's fate to its keeping or its breaking; the oath-magic that survived the Sundering.
  link_slug: the-sundering
- id: free-captain
  term: Free Captain
  definition: A shipmaster who answers to no house or crown, trading and raiding across the free seas at their own peril.
- id: reach-mist
  term: Reach-mist
  definition: The perpetual whale-blue sea-fog that hangs over the Shattered Reach, prized as lamp-oil and cursed as cover for raiders.
