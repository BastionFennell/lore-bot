- id: kin
  term: Kin
  definition: Colloquial term for the smaller, more ubiquitous creature-spirits that
    inhabit the Sundered Isles (comparable to Pokémon or Kodama). They range widely
    in behavior, intelligence, and abilities. People rarely know a Kin's true name
    or designation, so they're given broad type-labels such as Firekin, Waterkin,
    or Grasskin. Most people have 'bound' themselves to a Kin through simple everyday
    contracts — e.g. a grandmother offering a Grasskin part of her garden's harvest
    in exchange for fertilizing it, or a worker offering a Firekin precious wood in
    exchange for learning to make candlelight. Like Fathoms, Kin originate from the
    Apexes and will die if their originating Apex dies.
- id: fathoms
  term: Fathoms
  definition: Powerful magical creatures. The scale is arbitrary and context-dependent,
    ranging from sirens to sea serpents to the Kraken. Like Kin, Fathoms originate
    from the Apexes and will die if their originating Apex dies.
- id: apex
  term: Apex
  definition: Especially powerful magical creatures that each represent an entire
    domain. Fathoms and Kin originate from the Apexes, and should an Apex die, its
    Fathoms and Kin will die too. The Darkness that Dwells at the Bottom of the Ocean,
    for example, represents an idea, an entity, and a whole class of related Fathoms
    such as Ghost Whales or Shadow Rays.
- id: tidebound
  term: Tidebound
  definition: Magic users who have bound themselves or been bound to Fathoms. Their
    practice is known as tidebinding, taught by the four {{tidal-schools}}.
- id: tidal-schools
  term: Tidal Schools
  definition: The four schools of tidebinding — New Moon, Waxing Half, Full Moon,
    and Waning Half — each dedicated to a different Apex known as their Patron. Each
    school teaches a distinct style of tidebinding specializing in its patron's domain.
    The Tidal School of the Waxing Half was destroyed by the Kraken shortly before
    the beginning of the story.
