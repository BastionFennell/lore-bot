- id: kin
  term: Kin
  definition: Colloquial term for the smaller, more ubiquitous creature-spirits that
    inhabit the Sundered Isles (comparable to Pokémon or Kodama). They range widely
    in behavior, intelligence, and abilities. People rarely know a Kin's true name
    or designation, so they're given broad type-labels such as Firekin, Waterkin,
    or Grasskin. Most people have 'bound' themselves to a Kin through simple everyday
    contracts — e.g. a grandmother offering a Grasskin part of her garden's harvest
    in exchange for fertilizing it, or a worker offering a Firekin precious wood in
    exchange for learning to make candlelight. Like Fathoms, Kin originate from the
    Apexes and will die if their originating Apex dies.
